<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1000" fill="#F5F5F0"/>
  <rect x="40" y="40" width="1520" height="920" rx="28" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2"/>

  <text x="80" y="110" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#1A1A1A">Emotion Cards — UI Polish Priority Board</text>
  <text x="80" y="150" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#666666">Phase 3 reference mockup for planning alignment across cards, HUD, buttons, and indicators</text>

  <rect x="80" y="200" width="1420" height="140" rx="24" fill="#FFF8E1" stroke="#FFB703" stroke-width="3"/>
  <text x="110" y="245" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#8B5A00">Key issue</text>
  <text x="110" y="285" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#1A1A1A">The current card, HUD, and button specs are using different palettes, typography, and state logic.</text>
  <text x="110" y="320" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#444444">Polish should start with a unified token system, then move into frame readability, HUD cohesion, and interaction feel.</text>

  <g transform="translate(80,390)">
    <rect width="260" height="450" rx="24" fill="#FFF3E0" stroke="#E85D04" stroke-width="3"/>
    <text x="24" y="46" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#9D0208">P1 — Unify tokens</text>
    <text x="24" y="86" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#333333">Source of truth:</text>
    <text x="24" y="116" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">docs/style-guide.md</text>
    <text x="24" y="164" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• color tokens</text>
    <text x="24" y="196" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• type scale</text>
    <text x="24" y="228" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• radius + stroke</text>
    <text x="24" y="260" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• shared state names</text>
    <text x="24" y="292" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• motion guardrails</text>
    <rect x="24" y="350" width="210" height="54" rx="14" fill="#E85D04"/>
    <text x="50" y="384" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Do first</text>
  </g>

  <g transform="translate(370,390)">
    <rect width="260" height="450" rx="24" fill="#E0F4FF" stroke="#4361EE" stroke-width="3"/>
    <text x="24" y="46" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#1A1A40">P2 — Card polish</text>
    <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• title / rules hierarchy</text>
    <text x="24" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• family badge consistency</text>
    <text x="24" y="156" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• hover / selected / disabled</text>
    <text x="24" y="188" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• safe-zone validation</text>
    <text x="24" y="220" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• readability over art</text>
    <rect x="24" y="280" width="212" height="110" rx="16" fill="#FFFFFF" stroke="#A5A58D"/>
    <text x="42" y="320" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">Card is the core play</text>
    <text x="42" y="350" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">surface, so finish it</text>
    <text x="42" y="378" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">before juicing the rest.</text>
  </g>

  <g transform="translate(660,390)">
    <rect width="260" height="450" rx="24" fill="#F5F5F0" stroke="#6B705C" stroke-width="3"/>
    <text x="24" y="46" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#1C1C18">P3 — HUD cohesion</text>
    <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• health + energy restyle</text>
    <text x="24" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• turn banner redesign</text>
    <text x="24" y="156" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• status icon spacing</text>
    <text x="24" y="188" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• top/bottom grouping</text>
    <text x="24" y="220" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• overflow behavior</text>
    <rect x="24" y="292" width="212" height="96" rx="16" fill="#FFFFFF" stroke="#CCCCCC"/>
    <text x="42" y="328" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">HUD should feel like</text>
    <text x="42" y="356" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">the same product as</text>
    <text x="42" y="384" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">the cards.</text>
  </g>

  <g transform="translate(950,390)">
    <rect width="260" height="450" rx="24" fill="#FFF8E1" stroke="#FB8500" stroke-width="3"/>
    <text x="24" y="46" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#8B5A00">P4 — Buttons + states</text>
    <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• role hierarchy</text>
    <text x="24" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• icon alignment</text>
    <text x="24" y="156" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• hover / press / focus</text>
    <text x="24" y="188" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• destructive affordances</text>
    <text x="24" y="220" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• controller readability</text>
    <rect x="24" y="292" width="212" height="54" rx="14" fill="#FFB703"/>
    <text x="58" y="326" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Clear affordance</text>
  </g>

  <g transform="translate(1240,390)">
    <rect width="260" height="450" rx="24" fill="#F3E8FF" stroke="#7209B7" stroke-width="3"/>
    <text x="24" y="46" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#3B0764">P5 — Motion polish</text>
    <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• card hover lift</text>
    <text x="24" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• play settle</text>
    <text x="24" y="156" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• turn transition</text>
    <text x="24" y="188" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• status gain/loss</text>
    <text x="24" y="220" font-family="Inter, Arial, sans-serif" font-size="18" fill="#444444">• family accent FX</text>
    <rect x="24" y="286" width="212" height="116" rx="16" fill="#FFFFFF" stroke="#D8B4FE"/>
    <text x="42" y="324" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#333333">Cozy responsiveness,</text>
    <text x="42" y="352" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">not casino noise.</text>
    <text x="42" y="388" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">Add last, not first.</text>
  </g>

  <text x="80" y="900" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#666666">Reference families: Fire • Storm • Shadow • Warmth</text>
  <text x="80" y="930" font-family="Inter, Arial, sans-serif" font-size="18" fill="#666666">Use shared tokens for color, type, spacing, radius, stroke, shadow, and motion timing.</text>
</svg>
