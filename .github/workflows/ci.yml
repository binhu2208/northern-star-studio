name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd src
        npm ci
    
    - name: Run tests
      run: |
        cd src
        npm test
    
    - name: Build
      run: |
        cd src
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: src/dist/
    
    - name: Notify Discord on failure
      if: failure()
      run: |
        curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"❌ Build failed for ${{ github.ref }} by ${{ github.actor }}\"}"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd src
        npm ci
    
    - name: Run linter
      run: |
        cd src
        npm run lint
    
    - name: Notify Discord on failure
      if: failure()
      run: |
        curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"❌ Lint failed for ${{ github.ref }} by ${{ github.actor }}\"}"

  docs-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check docs structure
      run: |
        test -d docs/gdd || echo "⚠️ Missing docs/gdd/"
        test -d docs/roadmap || echo "⚠️ Missing docs/roadmap/"
        test -d docs/meetings || echo "⚠️ Missing docs/meetings/"
        test -d docs/marketing || echo "⚠️ Missing docs/marketing/"
    
    - name: Notify Discord on success
      if: success()
      run: |
        curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"✅ CI passed for ${{ github.ref }}\"}"
